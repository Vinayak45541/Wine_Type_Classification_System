services:
  # ─── Backend (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: wine-classifier-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://wine-classifier-frontend.onrender.com   # update after frontend is deployed

  # ─── Frontend (React / Vite static site) ─────────────────────────────────────
  - type: web
    name: wine-classifier-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://wine-classifier-backend.onrender.com    # update after backend is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
